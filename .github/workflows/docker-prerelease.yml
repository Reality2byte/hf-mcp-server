name: Docker Pre-release Build

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: 'Tag suffix for pre-release (e.g., alpha, beta, rc1)'
        required: false
        default: 'alpha'
      push_to_registry:
        description: 'Push to registry (true/false)'
        required: false
        default: 'true'

jobs:
  docker-prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to GitHub Container Registry
        if: github.event.inputs.push_to_registry != 'false'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        env:
          TAG_SUFFIX: ${{ github.event.inputs.tag_suffix }}
        run: |
          # Get version from package.json
          VERSION=$(node -p "require('./package.json').version")

          # Generate tag based on trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - sanitize suffix (keep only valid Docker tag chars)
            SAFE_SUFFIX=$(echo "$TAG_SUFFIX" | tr -cd 'a-zA-Z0-9_.-')
            BRANCH_NAME="${SAFE_SUFFIX:-alpha}"
            TAG="${VERSION}-${BRANCH_NAME}.$(date +%Y%m%d-%H%M%S)"
          else
            # Branch push - use branch name and commit
            BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/} | sed 's/[^a-zA-Z0-9-]/-/g')
            SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
            TAG="${VERSION}-${BRANCH_NAME}.${SHORT_SHA}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "docker_tag=ghcr.io/${{ github.repository }}:${TAG}" >> $GITHUB_OUTPUT
          echo "docker_tag_latest=ghcr.io/${{ github.repository }}:${BRANCH_NAME}-latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.push_to_registry != 'false' }}
          tags: |
            ${{ steps.meta.outputs.docker_tag }}
            ${{ steps.meta.outputs.docker_tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Output image details
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
          DOCKER_TAG: ${{ steps.meta.outputs.docker_tag }}
          DOCKER_TAG_LATEST: ${{ steps.meta.outputs.docker_tag_latest }}
          PUSH_TO_REGISTRY: ${{ github.event.inputs.push_to_registry }}
        run: |
          echo "### 🐳 Docker Pre-release Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${PUSH_TO_REGISTRY}" != "false" ]; then
            echo "**Images pushed to:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`${DOCKER_TAG}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`${DOCKER_TAG_LATEST}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ${DOCKER_TAG}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Note:** Image was built but not pushed to registry" >> $GITHUB_STEP_SUMMARY
          fi
